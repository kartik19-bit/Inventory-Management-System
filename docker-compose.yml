services:

  db:
    image: postgres:17

    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - db

  frontend:
    build: ./frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: